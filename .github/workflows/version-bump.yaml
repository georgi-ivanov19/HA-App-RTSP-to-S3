name: Version bump

on:
  workflow_dispatch:
    inputs:
      addon:
        description: "Add-on to bump"
        required: true
        type: choice
        options:
          - rtsp_to_s3

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    env:
      ADDON: ${{ github.event.inputs.addon }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate version and generate changelog
        id: changelog
        uses: TriPSs/conventional-changelog-action@v5
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          tag-prefix: ${{ env.ADDON }}/v
          git-path: ${{ env.ADDON }}/
          output-file: ${{ env.ADDON }}/CHANGELOG.md
          skip-version-file: true
          skip-commit: true
          skip-tag: true

      - name: Update config.yaml
        if: steps.changelog.outputs.skipped == 'false'
        env:
          NEW_VERSION: ${{ steps.changelog.outputs.version }}
        run: |
          sed -i "s/^version: .*/version: \"${NEW_VERSION}\"/" "${ADDON}/config.yaml"

      - name: Commit, tag, and push
        if: steps.changelog.outputs.skipped == 'false'
        env:
          NEW_VERSION: ${{ steps.changelog.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${ADDON}/config.yaml" "${ADDON}/CHANGELOG.md"
          git commit -m "chore(${ADDON}): bump version to ${NEW_VERSION}"
          git tag "${ADDON}/v${NEW_VERSION}"
          git push
          git push --tags

      - name: Create GitHub release
        if: steps.changelog.outputs.skipped == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.ADDON }}/v${{ steps.changelog.outputs.version }}
          body: ${{ steps.changelog.outputs.clean_changelog }}
