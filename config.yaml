name: "Tapo C230 Capture"
description: "Capture a Tapo C230 RTSP stream and upload segments to S3 via AWS IoT credentials"
version: "1.0.0"
slug: "tapo_c230_capture"
init: false
arch:
  - aarch64
startup: application
boot: auto
map:
  - ssl:ro
options:
  rtsp_url: "rtsp://username:password@192.168.1.x:554/stream2"
  s3_bucket: ""
  s3_prefix: "camera"
  s3_region: "eu-west-2"
  segment_duration: 60
  cert_dir: "/ssl/camera"
  iot_credential_endpoint: ""
  iot_role_alias: ""
  iot_thing_name: ""
  restart_delay: 10
schema:
  rtsp_url: str
  s3_bucket: str
  s3_prefix: str
  s3_region: str
  segment_duration: int
  cert_dir: str
  iot_credential_endpoint: str
  iot_role_alias: str
  iot_thing_name: str
  restart_delay: int
